openapi: 3.0.3
info:
  title: Fieldnotes Blog API
  version: 1.0.0
  description: 블로그 사용자/관리자/공통 API v1 버전

servers:
  - url: https://{SERVER_URL}:8080/
    variables:
      SERVER_URL:
        default: example.com
           
tags:
  - name: Common
    description: 공통 API
  - name: Public
    description: 사용자 API
  - name: Admin
    description: 관리자 API

# ────────────────────────────────────────────
# Security
# ────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token

  # ────────────────────────────────────────────
  # Reusable Schemas
  # ────────────────────────────────────────────
  schemas:
    # ── 계정 수정 ─────────────────────────────
    AccountUpdate:
      type: object
      required: [id, passwordStatus, nickname, avatarUrl]
      properties: 
        id:
          type: string
          example: "admin1"
        passwordStatus:
          type: string
          example: "CHANGED"
        nickname:
          type: string
          example: "Admin"
        avatarUrl:
          type: string
          example: "https://example.com/avatar.png"

    # ── 공통 응답 래퍼 ──────────────────────────
    CommonResponse:
      type: object
      required: [status, code, detail, message, timestamp, path]
      properties:
        status:
          type: integer
          example: 200
        code:
          type: string
          example: "E200_001"
        detail:
          type: string
          example: "Successfully retrieved."
        message:
          type: string
          example: "정상적으로 처리되었습니다."
        timestamp:
          type: string
          format: date-time
          example: "2026-01-20T16:31:00+09:00"
        path:
          type: string
          example: "/api/v1/posts"

    # ── 에러 응답 ──────────────────────────────
    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/CommonResponse'

    # ── 페이지네이션 ────────────────────────────
    Pagination:
      type: object
      required: [page, pageSize, total, totalPages, hasNextPage, hasPrevPage]
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 8
        total:
          type: integer
          example: 3
        totalPages:
          type: integer
          example: 1
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean

    # ── 정렬 ────────────────────────────────────
    Sort:
      type: object
      required: [by, dir]
      properties:
        by:
          type: string
          example: "createdAt"
        dir:
          type: string
          enum: [asc, desc]
          example: "desc"

    # ── 태그 (Public) ────────────────────────────
    TagPublic:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: "태그1"
        slug:
          type: string
          example: "tag-1"

    # ── 카테고리 (Public: posts/post) ────────────
    CategoryPublic:
      type: object
      required: [id, name, slug, breadcrumb]
      nullable: true
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: "개발"
        slug:
          type: string
          example: "development"
        breadcrumb:
          type: string
          example: "전공 > 개발"

    # ── 카테고리 상세 (Admin) ─────
    CategoryDetail:
      type: object
      required: [id, parentId, name, slug, path, breadcrumb, createdAt, updatedAt]
      properties:
        id:
          type: integer
          example: 5
        parentId:
          type: integer
          nullable: true
          example: 2
        name:
          type: string
          example: "C++"
        slug:
          type: string
          example: "cpp"
        path:
          type: string
          example: "0001/0002/0005"
        breadcrumb:
          type: string
          example: "개발 > 응용 프로그램 > C++"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── 게시물 요약 (Public 목록) ─────────────────
    PostSummaryPublic:
      type: object
      required: [id, slug, title, excerpt, thumbnail, createdAt, category, tags]
      properties:
        id:
          type: integer
          example: 1
        slug:
          type: string
          example: "example-my-blog-1"
        title:
          type: string
          example: "제목1"
        excerpt:
          type: string
          example: "내용 요약 1"
        thumbnail:
          type: string
          nullable: true
          example: "https://img.example.com/test.png"
        createdAt:
          type: string
          format: date-time
        category:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CategoryPublic'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagPublic'

    # ── 게시물 상세 (Public 단건) ─────────────────
    PostDetailPublic:
      type: object
      required: [id, slug, title, content, thumbnail, createdAt, updatedAt, category, tags]
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        content:
          type: string
        thumbnail:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        category:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CategoryPublic'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagPublic'

    # ── 게시물 요약 (Admin 목록) ──────────────────
    PostSummaryAdmin:
      allOf:
        - $ref: '#/components/schemas/PostSummaryPublic'
        - type: object
          required: [updatedAt, isPublish, isPrivate]
          properties:
            updatedAt:
              type: string
              format: date-time
            category:
              nullable: true
              allOf:
                - $ref: '#/components/schemas/CategoryDetail'
            isPublish:
              type: boolean
            isPrivate:
              type: boolean

    # ── 게시물 상세 (Admin/Create/Patch) ──────────
    PostDetailAdmin:
      type: object
      required: [id, slug, title, content, thumbnail, createdAt, updatedAt, isPublish, isPrivate, category, tags]
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        content:
          type: string
        thumbnail:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isPublish:
          type: boolean
        isPrivate:
          type: boolean
        category:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CategoryDetail'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagPublic'

    # ── 태그 상세 (Admin Create/Patch 결과) ────────
    TagDetail:
      type: object
      required: [id, name, slug, createdAt, updatedAt]
      properties:
        id:
          type: integer
          example: 12
        name:
          type: string
          example: "태그 12"
        slug:
          type: string
          example: "tag-12"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Diff (changedFields) ─────────────────────
    Diff:
      type: object
      required: [changedFields]
      properties:
        changedFields:
          type: array
          items:
            type: string
          example: ["name", "slug"]

# ────────────────────────────────────────────
# Paths
# ────────────────────────────────────────────
paths:

  # ============================================================
  # 공통
  # ============================================================
  /api/v1/health:
    get:
      tags: [Common]
      summary: 서버 헬스체크
      description: 서버 상태를 확인합니다. 'OK'를 반환합니다.
      operationId: healthCheck
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  # ============================================================
  # 사용자 API
  # ============================================================
  /api/v1/posts:
    get:
      tags: [Public]
      summary: 게시물 목록 조회
      description: 게시물 목록을 조회합니다.
      operationId: getPosts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 8
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
        - name: categorySlug
          in: query
          schema:
            type: string
            maxLength: 100
        - name: tagSlugs
          in: query
          schema:
            type: array
            items:
              type: string
            maxItems: 50
          style: form
          explode: false
        - name: tagFilterMode
          in: query
          schema:
            type: string
            enum: [OR, AND]
            default: OR
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, title, excerpt]
            default: createdAt
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 게시물 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          meta:
                            type: object
                            properties:
                              pagination:
                                $ref: '#/components/schemas/Pagination'
                              sort:
                                $ref: '#/components/schemas/Sort'
                              filters:
                                type: object
                                properties:
                                  search:
                                    type: string
                                    example: null
                                    nullable: true
                                  categorySlug:
                                    type: string
                                    example: null
                                    nullable: true
                                  tagSlugs:
                                    type: array
                                    example: ["tag-1", "tag-2", "java", "spring", "retrospective"]
                                    items:
                                      type: string
                          data:
                            type: array
                            items:
                              $ref: '#/components/schemas/PostSummaryPublic'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                code: "E400_003"
                detail: "The 'limit' parameter must not exceed 200."
                message: "요청 파라미터의 값이 허용된 범위를 벗어났습니다."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/posts"

    post:
      tags: [Admin]
      summary: 게시물 생성
      description: 게시물을 생성합니다. JWT 인증이 필요합니다.
      operationId: createPost
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, title, content]
              properties:
                slug:
                  type: string
                  example: "introduced-my-life"
                  maxLength: 150
                title:
                  type: string
                  example: "내 일상 소개"
                  maxLength: 100
                content:
                  type: string
                  example: "안녕하세요. 좋은 일상을 보내고 계신가요? 아니면, 반복되는 일상을 버티면서 살고 계신가요? 일상은 참 다양하고..."
                  maxLength: 100000
                thumbnail:
                  type: string
                  example: "https://img.example.com/asdf.png"
                  nullable: true
                  maxLength: 2048
                categoryId:
                  type: integer
                  example: 2
                  nullable: true
                tagIds:
                  type: array
                  example: [3,4]
                  items:
                    type: integer
                  maxItems: 50
                isPublish:
                  type: boolean
                  default: true
                isPrivate:
                  type: boolean
                  default: false
      responses:
        '201':
          description: 게시물 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - type: object
                    properties:
                      result:
                        $ref: '#/components/schemas/PostDetailAdmin'
              example:
                status: 201
                code: "E201_001"
                detail: "The post with ID '12' was created successfully."
                message: "리소스가 성공적으로 생성되었습니다."
                timestamp: "2026-01-16T13:19:00+09:00"
                path: "/api/v1/posts"
                result:
                  id: 12
                  slug: "introduced-my-life"
                  title: "내 일상 소개"
                  content: "안녕하세요. 좋은 일상을 보내고 계신가요? 아니면, 반복되는 일상을 간신히 버티면서 살고 계신가요? 각 사람의 일상은 참 다양하고..."
                  thumbnail: "https://img.example.com/asdf.png"
                  createdAt: "2025-12-22T18:07:23+09:00"
                  updatedAt: "2025-12-22T18:07:23+09:00"
                  isPublish: true
                  isPrivate: false
                  category:
                    id: 12
                    parentId: 7
                    name: "자료구조"
                    slug: "data-structure"
                    path: "0001/0007/0012"
                    breadcrumb: "IT > 컴퓨터 과학 > 자료구조"
                    createdAt: "2026-01-16T13:19:00+09:00"
                    updatedAt: "2026-01-26T21:30:00+09:00"
                  tags:
                    - id: 3
                      name: "태그1"
                      slug: "tag-1"
                    - id: 4
                      name: "태그2"
                      slug: "tag-2"
                
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                code: "E400_003"
                detail: "The 'title' parameter must not exceed 100."
                message: "요청 파라미터의 값이 허용된 범위를 벗어났습니다."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/posts"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 403
                code: "E403_001"
                detail: "Access Key is Invaild."
                message: "접근 권한이 없습니다."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/posts"

  /api/v1/posts/{slug}:
    get:
      tags: [Public]
      summary: 개별 게시물 조회
      description: 게시물의 Slug 값으로 게시물 내용을 가져옵니다.
      operationId: getPostBySlug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          example: "example-my-blog-1"
      responses:
        '200':
          description: 게시물 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - type: object
                    properties:
                      result:
                        $ref: '#/components/schemas/PostDetailPublic'
              example:
                status: 200
                code: "E200_001"
                detail: "Successfully retrieved the post."
                message: "게시글을 정상적으로 조회하였습니다."
                timestamp: "2026-01-16T13:19:00+09:00"
                path: "/api/v1/posts/example-my-blog-1"
                result:
                  id: 1
                  slug: "example-my-blog-1"
                  title: "제목1"
                  content: "전체 내용1"
                  thumbnail: "https://img.example.com/test.png"
                  createdAt: "2025-12-22T18:07:23+09:00"
                  updatedAt: "2025-12-22T18:07:23+09:00"
                  category:
                    id: 2
                    name: "개발"
                    slug: "development"
                    breadcrumb: "개발"
                  tags:
                    - id: 3
                      name: "태그1"
                      slug: "tag-1"
                    - id: 5
                      name: "태그2"
                      slug: "tag-2"
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 404
                code: "E404_001"
                detail: "Post resource not found."
                message: "요청한 리소스를 찾을 수 없습니다."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/posts/example-my-blog8"

  /api/v1/posts/admin:
    get:
      tags: [Admin]
      summary: 관리자용 게시물 목록 조회
      description: 비공개글을 포함하여 전체 게시물 목록을 조회합니다. JWT 인증이 필요합니다.
      operationId: getPostsAdmin
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 8
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
        - name: categorySlug
          in: query
          schema:
            type: string
            maxLength: 100
        - name: tagSlugs
          in: query
          schema:
            type: array
            items:
              type: string
            maxItems: 50
          style: form
          explode: false
        - name: tagFilterMode
          in: query
          schema:
            type: string
            enum: [OR, AND]
            default: OR
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, updatedAt, title, excerpt]
            default: createdAt
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: isPublish
          in: query
          schema:
            type: boolean
            default: true
        - name: isPrivate
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 관리자 게시물 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          meta:
                            type: object
                            properties:
                              pagination:
                                $ref: '#/components/schemas/Pagination'
                              sort:
                                $ref: '#/components/schemas/Sort'
                              filters:
                                type: object
                                properties:
                                  search:
                                    type: string
                                    nullable: true
                                  categorySlug:
                                    type: string
                                    nullable: true
                                  tagSlugs:
                                    type: array
                                    items:
                                      type: string
                                  isPublish:
                                    type: boolean
                                  isPrivate:
                                    type: boolean
                          data:
                            type: array
                            items:
                              $ref: '#/components/schemas/PostSummaryAdmin'
              example:
                status: 200
                code: "E200_001"
                detail: "Successfully retrieved 3 posts."
                message: "정상적으로 페이지를 조회하였습니다."
                timestamp: "2026-01-20T16:31:00+09:00"
                path: "/api/v1/posts/admin"
                result:
                  meta:
                    pagination:
                      page: 1
                      pageSize: 8
                      total: 3
                      totalPages: 1
                      hasNextPage: false
                      hasPrevPage: false
                    sort:
                      by: "createdAt"
                      dir: "desc"
                    filters:
                      search: null
                      categorySlug: null
                      tagSlugs:
                        - "tag-1"
                        - "tag-2"
                        - "java"
                        - "spring"
                        - "retrospective"
                      isPublish: true
                      isPrivate: false
                  data:
                    - id: 1
                      slug: "example-my-blog-1"
                      title: "제목1"
                      excerpt: "내용 요약 1"
                      thumbnail: "https://img.example.com/test.png"
                      createdAt: "2025-12-22T18:07:23+09:00"
                      updatedAt: "2025-12-22T18:07:23+09:00"
                      category: null
                      tags:
                        - id: 3
                          name: "태그1"
                          slug: "tag-1"
                        - id: 5
                          name: "태그2"
                          slug: "tag-2"
                      isPublish: true
                      isPrivate: false
                    - id: 2
                      slug: "example-my-blog-2"
                      title: "제목2"
                      excerpt: "내용 요약 2"
                      thumbnail: null
                      createdAt: "2025-12-23T09:15:10+09:00"
                      updatedAt: "2026-01-22T14:18:23+09:00"
                      category:
                        id: 2
                        parentId: 1
                        name: "개발"
                        slug: "development"
                        path: "0001/0002"
                        breadcrumb: "자기계발 > 개발"
                      tags:
                        - id: 1
                          name: "Java"
                          slug: "java"
                        - id: 4
                          name: "Spring"
                          slug: "spring"
                      isPublish: true
                      isPrivate: false
                    - id: 3
                      slug: "example-my-blog-3"
                      title: "제목3"
                      excerpt: "내용 요약 3"
                      thumbnail: "https://img.example.com/test3.png"
                      createdAt: "2025-12-24T21:42:55+09:00"
                      updatedAt: "2026-01-22T14:18:23+09:00"
                      category:
                        id: 3
                        parentId: 4
                        name: "일상"
                        slug: "daily"
                        path: "0004/0003"
                        breadcrumb: "개인 > 일상"
                      tags:
                        - id: 6
                          name: "회고"
                          slug: "retrospective"
                      isPublish: true
                      isPrivate: false
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                code: "E400_003"
                detail: "The 'pageSize' parameter must not exceed 200."
                message: "요청 파라미터의 값이 허용된 범위를 벗어났습니다."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/posts/admin"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
