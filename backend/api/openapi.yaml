  /api/v1/static/{file}:
    get:
      tags: [Public]
      summary: 정적 파일 조회
      description: 정적 파일(이미지 등)을 반환합니다.
      operationId: getStaticFile
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
          example: "test.png"
      responses:
        '200':
          description: 파일 반환 성공
          headers:
            Content-Type:
              schema:
                type: string
                example: "image/png"
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=31536000"
          content:
            image/*:
              schema:
                type: string
                format: binary
        '403':
          description: 허용되지 않은 파일 타입
        '404':
          description: 파일 없음

  # ============================================================
  # 인증 (Auth)
  # ============================================================
  /api/v1/auth/login: 
    post:
      tags: [Admin]
      summary: 관리자 로그인
      description: 관리자 계정으로 로그인하여 JWT 쿠키를 발급합니다.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, password]
              properties:
                id:
                  type: string
                  example: "admin"
                password:
                  type: string
                  format: password
                  example: "p455w06d"
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "access_token=eyJ...; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=3600"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'
              example:
                status: 200
                code: "E200_001"
                message: "정상적으로 처리되었습니다."
                detail: "Login successfully."
                timestamp: "2026-01-16T13:19:00+09:00"
                path: "/api/v1/auth/login"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                code: "E400_002"
                message: "요청 파라미터의 타입 또는 형식이 올바르지 않습니다."
                detail: "The request parameter 'id' is invalid."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/auth/login"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 401
                code: "E401_001"
                message: "관리자 로그인에 실패하였습니다. 비밀번호를 다시 확인해주세요."
                detail: "Invalid admin credentials."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/auth/login"
              

  /api/v1/auth/register:
    post:
      tags: [Admin]
      summary: 관리자 계정 생성
      description: |
        관리자 계정을 생성합니다.  
        DB에 계정이 없는 경우(Bootstrap) JWT 없이 1개 생성 가능.  
        이후 추가 생성 시 JWT 인증이 필요합니다.
      operationId: register
      security:
        - {}
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, password]
              properties:
                id:
                  type: string
                  example: "admin"
                  minLength: 3
                  maxLength: 31
                password:
                  type: string
                  example: "p455w06d"
                  format: password
                  minLength: 8
                  maxLength: 80
                nickname:
                  type: string
                  example: "Administrator"
                  minLength: 2
                  maxLength: 20
                avatarUrl:
                  type: string
                  example: "https://example.com/avatar.svg"
                  maxLength: 2048
      responses:
        '201':
          description: 계정 생성 성공
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'
              example:
                status: 201
                code: "E201_001"
                message: "리소스가 성공적으로 생성되었습니다."
                detail: "Account created successfully."
                timestamp: "2026-01-16T13:19:00+09:00"
                path: "/api/v1/auth/register"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                code: "E400_003"
                detail: "The 'id' parameter must not exceed 31."
                message: "요청 파라미터의 값이 허용된 범위를 벗어났습니다."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/auth/register"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 401
                code: "E401_001"
                message: "인증에 실패하였습니다."
                detail: "Invalid admin credentials."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/auth/register"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 403
                code: "E403_001"
                detail: "Admin Role required."
                message: "접근 권한이 없습니다."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/auth/register"
        '409':
          description: Conflict (아이디 중복)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 409
                code: "E409_001"
                detail: "accountId already exists."
                message: "서버의 현재 상태와 요청이 충돌하였습니다."
                timestamp: "2025-12-26T01:34:00+09:00"
                path: "/api/v1/auth/register"

